<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepfake Agent Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        
        .upload-section {
            background: #f8f9fa;
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        
        .upload-section:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }
        
        .upload-section.dragover {
            border-color: #667eea;
            background: #e8ecff;
            transform: scale(1.02);
        }
        
        #file-input {
            display: none;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 10px;
        }
        
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .upload-btn:active {
            transform: translateY(0);
        }
        
        .upload-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        #file-name {
            margin: 15px 0;
            font-weight: 500;
            color: #333;
        }
        
        .process-section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ddd;
        }
        
        .status-indicator.running {
            background: #4ade80;
            animation: pulse 1.5s infinite;
        }
        
        .status-indicator.completed {
            background: #667eea;
        }
        
        .status-indicator.error {
            background: #ef4444;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        
        #process-log {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 20px;
            height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            border: 1px solid #e9ecef;
        }
        
        .log-entry {
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .log-entry.waiting {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
        }
        
        .log-entry.running {
            background: #d1fae5;
            border-left: 4px solid #10b981;
        }
        
        .log-entry.completed {
            background: #dbeafe;
            border-left: 4px solid #3b82f6;
        }
        
        .log-entry.error {
            background: #fee2e2;
            border-left: 4px solid #ef4444;
        }
        
        .log-time {
            color: #666;
            font-size: 12px;
            margin-right: 10px;
        }
        
        .log-status {
            font-weight: 600;
            margin-right: 10px;
        }
        
        .report-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 25px;
            border: 1px solid #e9ecef;
        }
        
        #report-content {
            margin-top: 15px;
            background: white;
            border-radius: 8px;
            padding: 20px;
            line-height: 1.8;
            color: #333;
            min-height: 200px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        
        .report-content.empty {
            color: #999;
            text-align: center;
            padding: 60px 20px;
        }
        
        .copy-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
            transition: all 0.3s ease;
        }
        
        .copy-btn:hover {
            background: #059669;
            transform: translateY(-1px);
        }
        
        .copy-btn:active {
            transform: translateY(0);
        }
        
        .copy-notification {
            background: #10b981;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .copy-notification.show {
            opacity: 1;
        }
        
        /* 滚动条样式 */
        #process-log::-webkit-scrollbar {
            width: 8px;
        }
        
        #process-log::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }
        
        #process-log::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        
        #process-log::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .upload-section {
                padding: 20px;
            }
            
            #process-log {
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Deepfake Agent Demo</h1>
        <p class="subtitle">上传图片进行深度伪造分析，实时查看分析流程</p>
        
        <!-- 上传区域 -->
        <div class="upload-section" id="upload-section">
            <input type="file" id="file-input" accept="image/*">
            <h3>选择或拖拽图片到此处</h3>
            <p>支持 JPG、PNG、WEBP 等格式</p>
            <button class="upload-btn" onclick="document.getElementById('file-input').click()">选择图片</button>
            <div id="file-name"></div>
            <button class="upload-btn" id="upload-btn" disabled>开始分析</button>
        </div>
        
        <!-- 任务流程区域 -->
        <div class="process-section">
            <h2 class="section-title">
                <span class="status-indicator" id="overall-status"></span>
                任务流程
            </h2>
            <div id="process-log"></div>
        </div>
        
        <!-- 报告区域 -->
        <div class="report-section">
            <h2 class="section-title">分析报告</h2>
            <div id="report-content" class="empty">
                分析完成后，报告将显示在此处
            </div>
            <button class="copy-btn" id="copy-btn" onclick="copyReport()" style="display: none;">复制报告</button>
        </div>
    </div>
    
    <!-- 复制成功通知 -->
    <div class="copy-notification" id="copy-notification">
        报告已复制到剪贴板
    </div>
    
    <script>
        // 全局变量
        let selectedFile = null;
        let isUploading = false;
        
        // 初始化事件监听
        document.addEventListener('DOMContentLoaded', function() {
            const fileInput = document.getElementById('file-input');
            const uploadBtn = document.getElementById('upload-btn');
            const uploadSection = document.getElementById('upload-section');
            
            // 文件选择事件
            fileInput.addEventListener('change', function(e) {
                if (e.target.files.length > 0) {
                    selectedFile = e.target.files[0];
                    document.getElementById('file-name').textContent = `已选择: ${selectedFile.name}`;
                    uploadBtn.disabled = false;
                }
            });
            
            // 上传按钮点击事件
            uploadBtn.addEventListener('click', uploadFile);
            
            // 拖拽事件处理
            uploadSection.addEventListener('dragover', function(e) {
                e.preventDefault();
                this.classList.add('dragover');
            });
            
            uploadSection.addEventListener('dragleave', function() {
                this.classList.remove('dragover');
            });
            
            uploadSection.addEventListener('drop', function(e) {
                e.preventDefault();
                this.classList.remove('dragover');
                
                if (e.dataTransfer.files.length > 0) {
                    selectedFile = e.dataTransfer.files[0];
                    document.getElementById('file-name').textContent = `已选择: ${selectedFile.name}`;
                    uploadBtn.disabled = false;
                }
            });
        });
        
        // 上传文件
        async function uploadFile() {
            if (!selectedFile || isUploading) return;
            
            isUploading = true;
            const uploadBtn = document.getElementById('upload-btn');
            const overallStatus = document.getElementById('overall-status');
            
            // 更新UI状态
            uploadBtn.disabled = true;
            uploadBtn.textContent = '分析中...';
            overallStatus.className = 'status-indicator running';
            
            // 清空之前的日志和报告
            document.getElementById('process-log').innerHTML = '';
            document.getElementById('report-content').innerHTML = '分析中，请稍候...';
            document.getElementById('report-content').className = '';
            document.getElementById('copy-btn').style.display = 'none';
            
            // 添加开始日志
            addLogEntry('info', '开始分析图片...');
            
            try {
                // 创建FormData
                const formData = new FormData();
                formData.append('file', selectedFile);
                
                // 发送请求
                const response = await fetch('/api/task/stream', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                // 处理流式响应
                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let buffer = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    buffer += decoder.decode(value, { stream: true });
                    
                    // 处理每一行JSON
                    const lines = buffer.split('\n');
                    buffer = lines.pop(); // 保留不完整的行
                    
                    for (const line of lines) {
                        if (line.trim()) {
                            const data = JSON.parse(line);
                            processStreamData(data);
                        }
                    }
                }
                
                // 处理最后一行
                if (buffer.trim()) {
                    const data = JSON.parse(buffer);
                    processStreamData(data);
                }
                
            } catch (error) {
                addLogEntry('error', `分析失败: ${error.message}`);
                document.getElementById('report-content').innerHTML = `分析失败: ${error.message}`;
                overallStatus.className = 'status-indicator error';
            } finally {
                isUploading = false;
                uploadBtn.textContent = '开始分析';
            }
        }
        
        // 处理流式数据
        function processStreamData(data) {
            const { status, message } = data;
            
            switch (status) {
                case 'img_content':
                    addLogEntry('running', '正在提取图片内容...');
                    break;
                case 'plan':
                    addLogEntry('running', `正在生成分析计划: ${message}`);
                    break;
                case 'tasks':
                    addLogEntry('running', message);
                    break;
                case 'analysis':
                    addLogEntry('running', `正在分析: ${message}`);
                    break;
                case 'summary':
                    addLogEntry('completed', '分析完成，正在生成报告...');
                    document.getElementById('report-content').innerHTML = message;
                    document.getElementById('copy-btn').style.display = 'inline-block';
                    document.getElementById('overall-status').className = 'status-indicator completed';
                    break;
                case 'finished':
                    addLogEntry('completed', message);
                    break;
                case 'error':
                    addLogEntry('error', message);
                    document.getElementById('overall-status').className = 'status-indicator error';
                    break;
                default:
                    addLogEntry('running', `${status}: ${message}`);
            }
        }
        
        // 添加日志条目
        function addLogEntry(type, message) {
            const logContainer = document.getElementById('process-log');
            const logEntry = document.createElement('div');
            
            const now = new Date();
            const timeStr = now.toLocaleTimeString();
            
            let statusClass = 'waiting';
            let statusText = '等待';
            
            switch (type) {
                case 'running':
                    statusClass = 'running';
                    statusText = '运行中';
                    break;
                case 'completed':
                    statusClass = 'completed';
                    statusText = '完成';
                    break;
                case 'error':
                    statusClass = 'error';
                    statusText = '错误';
                    break;
                case 'info':
                    statusClass = 'waiting';
                    statusText = '信息';
                    break;
            }
            
            logEntry.className = `log-entry ${statusClass}`;
            logEntry.innerHTML = `
                <span class="log-time">${timeStr}</span>
                <span class="log-status">${statusText}</span>
                <span class="log-message">${message}</span>
            `;
            
            logContainer.appendChild(logEntry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }
        
        // 复制报告
        function copyReport() {
            const reportContent = document.getElementById('report-content').textContent;
            navigator.clipboard.writeText(reportContent)
                .then(() => {
                    const notification = document.getElementById('copy-notification');
                    notification.classList.add('show');
                    setTimeout(() => {
                        notification.classList.remove('show');
                    }, 2000);
                })
                .catch(err => {
                    console.error('复制失败:', err);
                });
        }
    </script>
</body>
</html>
